name: Deploy to ECS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 084928383265.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t my-app .

      - name: Tag image
        run: docker tag my-app:latest 084928383265.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest

      - name: Push image
        run: docker push 084928383265.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster my-cluster \
            --service app-service-lc2cue16 \
            --force-new-deployment \
            --region ap-south-1

          